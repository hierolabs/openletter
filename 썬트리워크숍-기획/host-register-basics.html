<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>숙소 기본 정보 – OPEN LETTER HOST</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --white: #ffffff;
      --dark: #222222;
      --mid: #717171;
      --light: #b0b0b0;
      --border: #dddddd;
      --accent-brown: #3d3028;
      --radius: 12px;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HOST NAVBAR ──────────────────────────── */
    .host-navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--white); display: flex; align-items: center;
      justify-content: space-between; padding: 0 40px; height: 80px;
    }
    .host-nav-logo {
      font-size: 17px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dark); text-decoration: none; line-height: 1.2;
    }
    .host-nav-logo span { display: block; font-weight: 300; letter-spacing: 0.15em; font-size: 14px; }
    .btn-exit {
      background: #f7f7f7; border: none; border-radius: 20px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      color: var(--dark); cursor: pointer; transition: background 0.15s;
    }
    .btn-exit:hover { background: #eaeaea; }

    /* ─── MAIN CONTENT ─────────────────────────── */
    .main-content {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 140px 24px 140px; max-width: 600px;
      margin: 0 auto; width: 100%;
    }
    .page-title {
      font-size: 32px; font-weight: 700; margin-bottom: 12px;
      letter-spacing: -0.02em; text-align: center; line-height: 1.3;
    }
    .page-sub {
      font-size: 16px; color: var(--mid); margin-bottom: 48px;
      text-align: center;
    }

    /* ─── COUNTER LIST ─────────────────────────── */
    .counter-list {
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    .counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .counter-row:last-child {
      border-bottom: none;
    }
    .counter-label {
      font-size: 18px;
      font-weight: 600;
      color: var(--dark);
    }
    .counter-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .btn-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--light);
      background: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--mid);
      line-height: 1;
      transition: all 0.2s;
    }
    .btn-circle:hover:not(:disabled) {
      border-color: var(--dark);
      color: var(--dark);
    }
    .btn-circle:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }
    .counter-val {
      font-size: 16px;
      font-weight: 500;
      min-width: 24px;
      text-align: center;
    }

    /* ─── BOTTOM FIXED BAR ─────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 84px;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; z-index: 100;
    }
    .progress-bar {
      position: absolute; top: -1px; left: 0; right: 0;
      height: 2px; background: var(--border);
    }
    .progress-fill {
      width: 80%; /* 4단계 진행도 */
      height: 100%; background: var(--dark); transition: width 0.3s ease;
    }
    .btn-prev {
      background: none; border: none; font-size: 16px; font-weight: 600;
      color: var(--dark); text-decoration: underline;
      cursor: pointer; transition: color 0.15s; padding: 10px;
    }
    .btn-prev:hover { color: #000; }
    .btn-next {
      background: var(--dark); color: var(--white); border: none;
      border-radius: 8px; padding: 14px 32px; font-size: 16px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-next:hover:not(:disabled) { background: #000; }
    .btn-next:disabled { background: #dddddd; color: #ffffff; cursor: not-allowed; }

    @media (max-width: 640px) {
      .host-navbar { padding: 0 24px; height: 64px; }
      .bottom-bar { padding: 0 24px; }
      .main-content { padding-top: 100px; padding-bottom: 120px;}
      .page-title { font-size: 26px; }
    }
  </style>
</head>
<body>

  <header class="host-navbar">
    <a class="host-nav-logo" href="host-dashboard.html">
      OPEN LETTER
      <span>HOST</span>
    </a>
    <button class="btn-exit" onclick="window.location.href='host-dashboard.html'">저장 및 나가기</button>
  </header>

  <main class="main-content">
    <h1 class="page-title">숙소 기본 정보를 알려주세요</h1>
    <p class="page-sub">세부 사항은 나중에 추가하실 수 있습니다.</p>

    <div class="counter-list">
      <!-- 게스트 -->
      <div class="counter-row">
        <div class="counter-label">게스트</div>
        <div class="counter-controls">
          <button class="btn-circle" onclick="updateCount('guests', -1)" id="guests-minus" disabled>−</button>
          <span class="counter-val" id="guests-val">1</span>
          <button class="btn-circle" onclick="updateCount('guests', 1)">+</button>
        </div>
      </div>
      <!-- 침실 -->
      <div class="counter-row">
        <div class="counter-label">침실</div>
        <div class="counter-controls">
          <button class="btn-circle" onclick="updateCount('bedrooms', -1)" id="bedrooms-minus" disabled>−</button>
          <span class="counter-val" id="bedrooms-val">0</span>
          <button class="btn-circle" onclick="updateCount('bedrooms', 1)">+</button>
        </div>
      </div>
      <!-- 침대 -->
      <div class="counter-row">
        <div class="counter-label">침대</div>
        <div class="counter-controls">
          <button class="btn-circle" onclick="updateCount('beds', -1)" id="beds-minus" disabled>−</button>
          <span class="counter-val" id="beds-val">1</span>
          <button class="btn-circle" onclick="updateCount('beds', 1)">+</button>
        </div>
      </div>
      <!-- 욕실 -->
      <div class="counter-row">
        <div class="counter-label">욕실</div>
        <div class="counter-controls">
          <button class="btn-circle" onclick="updateCount('bathrooms', -1)" id="bathrooms-minus" disabled>−</button>
          <span class="counter-val" id="bathrooms-val">1</span>
          <button class="btn-circle" onclick="updateCount('bathrooms', 1)">+</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="bottom-bar">
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <button class="btn-prev" onclick="history.back()">뒤로</button>
    <!-- 기본 최소값을 만족하므로 다음 버튼은 기본 활성화 상태 -->
    <button class="btn-next" id="nextBtn" onclick="window.location.href='host-register-photos.html'">다음</button>
  </footer>

  <script>
    const counts = {
      guests: 1,
      bedrooms: 0,
      beds: 1,
      bathrooms: 1
    };

    const mins = {
      guests: 1,
      bedrooms: 0,
      beds: 1,
      bathrooms: 1
    };

    function updateCount(key, delta) {
      const newVal = counts[key] + delta;
      if (newVal >= mins[key]) {
        counts[key] = newVal;
        document.getElementById(key + '-val').textContent = newVal;
        document.getElementById(key + '-minus').disabled = (newVal === mins[key]);
      }
    }
  </script>

</body>
</html>
