<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>숙소 소개 – OPEN LETTER HOST</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --white: #ffffff;
      --dark: #222222;
      --mid: #717171;
      --light: #b0b0b0;
      --border: #dddddd;
      --accent-brown: #3d3028;
      --radius: 12px;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HOST NAVBAR ──────────────────────────── */
    .host-navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--white); display: flex; align-items: center;
      justify-content: space-between; padding: 0 40px; height: 80px;
    }
    .host-nav-logo {
      font-size: 17px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dark); text-decoration: none; line-height: 1.2;
    }
    .host-nav-logo span { display: block; font-weight: 300; letter-spacing: 0.15em; font-size: 14px; }
    .btn-exit {
      background: #f7f7f7; border: none; border-radius: 20px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      color: var(--dark); cursor: pointer; transition: background 0.15s;
    }
    .btn-exit:hover { background: #eaeaea; }

    /* ─── MAIN CONTENT ─────────────────────────── */
    .main-content {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 140px 24px 140px; max-width: 680px;
      margin: 0 auto; width: 100%;
    }
    .page-title {
      font-size: 32px; font-weight: 700; margin-bottom: 48px;
      letter-spacing: -0.02em; text-align: center; line-height: 1.3;
    }

    /* ─── FORM ELEMENTS ────────────────────────── */
    .form-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      margin-bottom: 32px;
    }
    .form-label {
      font-size: 18px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 12px;
    }
    .form-input, .form-textarea {
      width: 100%;
      padding: 18px 20px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px;
      font-family: inherit;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--accent-brown);
    }
    .form-textarea {
      resize: vertical;
      min-height: 200px;
      line-height: 1.6;
    }
    .form-input::placeholder, .form-textarea::placeholder {
      color: var(--light);
    }
    .char-count {
      align-self: flex-end;
      font-size: 13px;
      font-weight: 500;
      color: var(--light);
      margin-top: 8px;
    }

    /* ─── BOTTOM FIXED BAR ─────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 84px;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; z-index: 100;
    }
    .progress-bar {
      position: absolute; top: -1px; left: 0; right: 0;
      height: 2px; background: var(--border);
    }
    .progress-fill {
      width: 85%; /* 6단계 진행도 */
      height: 100%; background: var(--dark); transition: width 0.3s ease;
    }
    .btn-prev {
      background: none; border: none; font-size: 16px; font-weight: 600;
      color: var(--dark); text-decoration: underline;
      cursor: pointer; transition: color 0.15s; padding: 10px;
    }
    .btn-prev:hover { color: #000; }
    .btn-next {
      background: var(--dark); color: var(--white); border: none;
      border-radius: 8px; padding: 14px 32px; font-size: 16px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-next:hover:not(:disabled) { background: #000; }
    .btn-next:disabled { background: #dddddd; color: #ffffff; cursor: not-allowed; }

    @media (max-width: 640px) {
      .host-navbar { padding: 0 24px; height: 64px; }
      .bottom-bar { padding: 0 24px; }
      .main-content { padding-top: 100px; padding-bottom: 120px;}
      .page-title { font-size: 26px; margin-bottom: 32px; }
    }
  </style>
</head>
<body>

  <header class="host-navbar">
    <a class="host-nav-logo" href="host-dashboard.html">
      OPEN LETTER
      <span>HOST</span>
    </a>
    <button class="btn-exit" onclick="window.location.href='host-dashboard.html'">저장 및 나가기</button>
  </header>

  <main class="main-content">
    <h1 class="page-title">숙소를 소개해주세요</h1>

    <!-- 1. 숙소 제목 -->
    <div class="form-group">
      <label class="form-label" for="stayTitle">숙소 제목</label>
      <input type="text" id="stayTitle" class="form-input" placeholder="예) 편지처럼 남겨지는 신당동의 아틀리에" maxlength="30">
      <div class="char-count" id="titleCount">0 / 30</div>
    </div>

    <!-- 2. 숙소 설명 -->
    <div class="form-group">
      <label class="form-label" for="stayDesc">숙소 소개</label>
      <textarea id="stayDesc" class="form-textarea" placeholder="이 공간만의 특별한 이야기를 들려주세요" maxlength="500"></textarea>
      <div class="char-count" id="descCount">0 / 500</div>
    </div>
  </main>

  <footer class="bottom-bar">
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <button class="btn-prev" onclick="history.back()">뒤로</button>
    <button class="btn-next" id="nextBtn" disabled onclick="window.location.href='host-register-price.html'">다음</button>
  </footer>

  <script>
    const titleInput = document.getElementById('stayTitle');
    const descInput = document.getElementById('stayDesc');
    const titleCount = document.getElementById('titleCount');
    const descCount = document.getElementById('descCount');
    const nextBtn = document.getElementById('nextBtn');

    function checkValidity() {
      const titleLen = titleInput.value.length;
      const descLen = descInput.value.length;
      titleCount.textContent = `${titleLen} / 30`;
      descCount.textContent = `${descLen} / 500`;
      nextBtn.disabled = (titleLen === 0 || descLen === 0);
    }
    titleInput.addEventListener('input', checkValidity);
    descInput.addEventListener('input', checkValidity);
  </script>
</body>
</html>
