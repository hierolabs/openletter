<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>숙소 위치 선택 – OPEN LETTER HOST</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --white: #ffffff;
      --dark: #222222;
      --mid: #717171;
      --light: #b0b0b0;
      --border: #dddddd;
      --accent-brown: #3d3028;
      --radius: 12px;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HOST NAVBAR ──────────────────────────── */
    .host-navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--white); display: flex; align-items: center;
      justify-content: space-between; padding: 0 40px; height: 80px;
    }
    .host-nav-logo {
      font-size: 17px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dark); text-decoration: none; line-height: 1.2;
    }
    .host-nav-logo span { display: block; font-weight: 300; letter-spacing: 0.15em; font-size: 14px; }
    .btn-exit {
      background: #f7f7f7; border: none; border-radius: 20px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      color: var(--dark); cursor: pointer; transition: background 0.15s;
    }
    .btn-exit:hover { background: #eaeaea; }

    /* ─── MAIN CONTENT ─────────────────────────── */
    .main-content {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 140px 24px 140px; max-width: 680px;
      margin: 0 auto; width: 100%;
    }
    .page-title {
      font-size: 32px; font-weight: 700; margin-bottom: 40px;
      letter-spacing: -0.02em; text-align: center; line-height: 1.3;
    }

    /* ─── LOCATION INPUT & MAP ─────────────────── */
    .address-search-wrap {
      width: 100%;
      margin-bottom: 24px;
    }
    .address-input {
      width: 100%;
      padding: 18px 20px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .address-input:focus {
      border-color: var(--accent-brown);
    }
    .map-placeholder {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #f5f5f5;
      border: 1.5px dashed #e0e0e0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--light);
      margin-bottom: 20px;
    }
    .location-notice {
      font-size: 14px;
      color: var(--mid);
      text-align: center;
      line-height: 1.6;
    }

    /* ─── BOTTOM FIXED BAR ─────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 84px;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; z-index: 100;
    }
    .progress-bar {
      position: absolute; top: -1px; left: 0; right: 0;
      height: 2px; background: var(--border);
    }
    .progress-fill {
      width: 60%; /* 3단계 진행도 */
      height: 100%; background: var(--dark); transition: width 0.3s ease;
    }
    .btn-prev {
      background: none; border: none; font-size: 16px; font-weight: 600;
      color: var(--dark); text-decoration: underline;
      cursor: pointer; transition: color 0.15s; padding: 10px;
    }
    .btn-prev:hover { color: #000; }
    .btn-next {
      background: var(--dark); color: var(--white); border: none;
      border-radius: 8px; padding: 14px 32px; font-size: 16px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-next:hover:not(:disabled) { background: #000; }
    .btn-next:disabled { background: #dddddd; color: #ffffff; cursor: not-allowed; }

    @media (max-width: 640px) {
      .host-navbar { padding: 0 24px; height: 64px; }
      .bottom-bar { padding: 0 24px; }
      .main-content { padding-top: 100px; padding-bottom: 120px;}
      .page-title { font-size: 26px; }
    }
  </style>
</head>
<body>

  <header class="host-navbar">
    <a class="host-nav-logo" href="host-dashboard.html">
      OPEN LETTER
      <span>HOST</span>
    </a>
    <button class="btn-exit" onclick="window.location.href='host-dashboard.html'">저장 및 나가기</button>
  </header>

  <main class="main-content">
    <h1 class="page-title">숙소 위치는 어디인가요?</h1>

    <div class="address-search-wrap">
      <input type="text" id="addressInput" class="address-input" placeholder="주소를 입력해주세요" oninput="checkNext()">
    </div>

    <div class="map-placeholder">
      🗺 지도 표시 영역
    </div>

    <p class="location-notice">
      정확한 주소는 예약이 확정된 게스트에게만 공개되니 안심하세요.
    </p>
  </main>

  <footer class="bottom-bar">
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <button class="btn-prev" onclick="history.back()">뒤로</button>
    <button class="btn-next" id="nextBtn" disabled onclick="window.location.href='host-register-basics.html'">다음</button>
  </footer>

  <script>
    function checkNext() {
      const addressInput = document.getElementById('addressInput').value.trim();
      document.getElementById('nextBtn').disabled = addressInput.length === 0;
    }
  </script>

</body>
</html>
