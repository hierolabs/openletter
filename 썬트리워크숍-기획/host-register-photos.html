<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>숙소 사진 등록 – OPEN LETTER HOST</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --white: #ffffff;
      --dark: #222222;
      --mid: #717171;
      --light: #b0b0b0;
      --border: #dddddd;
      --accent-brown: #3d3028;
      --radius: 12px;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HOST NAVBAR ──────────────────────────── */
    .host-navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--white); display: flex; align-items: center;
      justify-content: space-between; padding: 0 40px; height: 80px;
    }
    .host-nav-logo {
      font-size: 17px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dark); text-decoration: none; line-height: 1.2;
    }
    .host-nav-logo span { display: block; font-weight: 300; letter-spacing: 0.15em; font-size: 14px; }
    .btn-exit {
      background: #f7f7f7; border: none; border-radius: 20px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      color: var(--dark); cursor: pointer; transition: background 0.15s;
    }
    .btn-exit:hover { background: #eaeaea; }

    /* ─── MAIN CONTENT ─────────────────────────── */
    .main-content {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 140px 24px 140px; max-width: 800px;
      margin: 0 auto; width: 100%;
    }
    .page-title {
      font-size: 32px; font-weight: 700; margin-bottom: 12px;
      letter-spacing: -0.02em; text-align: center; line-height: 1.3;
    }
    .page-sub {
      font-size: 16px; color: var(--mid); margin-bottom: 48px;
      text-align: center; line-height: 1.6;
    }

    /* ─── PHOTO UPLOAD AREA ─────────────────── */
    .photo-upload-area {
      width: 100%;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }
    .upload-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
      color: var(--mid);
    }
    .upload-box:hover {
      border-color: var(--accent-brown);
      background-color: #fcfbf9;
    }
    .upload-icon {
      font-size: 40px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .upload-text {
      font-size: 15px;
      font-weight: 600;
    }
    #photoInput {
      display: none;
    }

    .photo-preview {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      overflow: hidden;
      background-size: cover;
      background-position: center;
      border: 1px solid var(--border);
    }
    .remove-photo-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .photo-preview:hover .remove-photo-btn {
      opacity: 1;
    }

    /* ─── BOTTOM FIXED BAR ─────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 84px;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; z-index: 100;
    }
    .progress-bar {
      position: absolute; top: -1px; left: 0; right: 0;
      height: 2px; background: var(--border);
    }
    .progress-fill {
      width: 83%; /* 5단계 진행도 */
      height: 100%; background: var(--dark); transition: width 0.3s ease;
    }
    .btn-prev {
      background: none; border: none; font-size: 16px; font-weight: 600;
      color: var(--dark); text-decoration: underline;
      cursor: pointer; transition: color 0.15s; padding: 10px;
    }
    .btn-prev:hover { color: #000; }
    .btn-next {
      background: var(--dark); color: var(--white); border: none;
      border-radius: 8px; padding: 14px 32px; font-size: 16px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-next:hover:not(:disabled) { background: #000; }
    .btn-next:disabled { background: #dddddd; color: #ffffff; cursor: not-allowed; }

    @media (max-width: 640px) {
      .host-navbar { padding: 0 24px; height: 64px; }
      .bottom-bar { padding: 0 24px; }
      .main-content { padding-top: 100px; padding-bottom: 120px;}
      .page-title { font-size: 26px; }
    }
  </style>
</head>
<body>

  <header class="host-navbar">
    <a class="host-nav-logo" href="host-dashboard.html">
      OPEN LETTER
      <span>HOST</span>
    </a>
    <button class="btn-exit" onclick="window.location.href='host-dashboard.html'">저장 및 나가기</button>
  </header>

  <main class="main-content">
    <h1 class="page-title">숙소 사진을 추가해주세요</h1>
    <p class="page-sub">최소 5장 이상 업로드해야 등록이 가능합니다.<br>나중에 추가하거나 변경할 수 있습니다.</p>

    <div class="photo-upload-area">
      <div class="photo-grid" id="photoGrid">
        <div class="upload-box" id="uploadBox">
          <div class="upload-icon">🎞️</div>
          <div class="upload-text">사진 추가하기</div>
        </div>
      </div>
      <input type="file" id="photoInput" multiple accept="image/*">
    </div>
  </main>

  <footer class="bottom-bar">
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <button class="btn-prev" onclick="history.back()">뒤로</button>
    <button class="btn-next" id="nextBtn" disabled onclick="window.location.href='host-register-description.html'">다음</button>
  </footer>

  <script>
    const photoInput = document.getElementById('photoInput');
    const uploadBox = document.getElementById('uploadBox');
    const photoGrid = document.getElementById('photoGrid');
    const nextBtn = document.getElementById('nextBtn');

    uploadBox.addEventListener('click', () => photoInput.click());

    photoInput.addEventListener('change', (event) => {
      const files = event.target.files;
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;

        const reader = new FileReader();
        reader.onload = (e) => {
          const previewId = 'photo-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
          const previewEl = document.createElement('div');
          previewEl.id = previewId;
          previewEl.classList.add('photo-preview');
          previewEl.style.backgroundImage = `url(${e.target.result})`;

          const removeBtn = document.createElement('button');
          removeBtn.classList.add('remove-photo-btn');
          removeBtn.innerHTML = '&times;';
          removeBtn.title = '사진 삭제';
          removeBtn.onclick = () => {
            document.getElementById(previewId).remove();
            checkNext();
          };

          previewEl.appendChild(removeBtn);
          // 새 사진을 업로드 박스 바로 다음에 추가
          uploadBox.insertAdjacentElement('afterend', previewEl);
          checkNext();
        };
        reader.readAsDataURL(file);
      }
      // 같은 파일을 다시 업로드할 수 있도록 입력값 초기화
      event.target.value = '';
    });

    function checkNext() {
      const photoCount = photoGrid.querySelectorAll('.photo-preview').length;
      nextBtn.disabled = photoCount < 5;
    }
  </script>

</body>
</html>
