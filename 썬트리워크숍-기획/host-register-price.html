<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>요금 설정 – OPEN LETTER HOST</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --white: #ffffff;
      --dark: #222222;
      --mid: #717171;
      --light: #b0b0b0;
      --border: #dddddd;
      --accent-brown: #3d3028;
      --radius: 12px;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HOST NAVBAR ──────────────────────────── */
    .host-navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--white); display: flex; align-items: center;
      justify-content: space-between; padding: 0 40px; height: 80px;
    }
    .host-nav-logo {
      font-size: 17px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dark); text-decoration: none; line-height: 1.2;
    }
    .host-nav-logo span { display: block; font-weight: 300; letter-spacing: 0.15em; font-size: 14px; }
    .btn-exit {
      background: #f7f7f7; border: none; border-radius: 20px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      color: var(--dark); cursor: pointer; transition: background 0.15s;
    }
    .btn-exit:hover { background: #eaeaea; }

    /* ─── MAIN CONTENT ─────────────────────────── */
    .main-content {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 140px 24px 140px; max-width: 600px;
      margin: 0 auto; width: 100%;
    }
    .page-title {
      font-size: 32px; font-weight: 700; margin-bottom: 48px;
      letter-spacing: -0.02em; text-align: center; line-height: 1.3;
    }

    /* ─── PRICE FORM ──────────────────────────── */
    .form-group {
      width: 100%;
      margin-bottom: 32px;
    }
    .form-label {
      display: block;
      font-size: 18px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 12px;
    }
    .input-wrap {
      position: relative;
      width: 100%;
    }
    .price-input {
      width: 100%;
      padding: 18px 60px 18px 20px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 18px;
      font-weight: 600;
      font-family: inherit;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s, background-color 0.2s;
      text-align: right;
    }
    .price-input:focus {
      border-color: var(--accent-brown);
    }
    .price-input:disabled {
      background-color: #f7f7f7;
      color: var(--light);
      cursor: not-allowed;
    }
    .price-input::placeholder {
      color: var(--light);
      font-weight: 400;
    }
    .input-suffix {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--mid);
      pointer-events: none;
    }
    
    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: -12px;
      margin-bottom: 32px;
      cursor: pointer;
    }
    .checkbox-wrap input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--dark);
      cursor: pointer;
    }
    .checkbox-label {
      font-size: 15px;
      color: var(--dark);
      user-select: none;
    }
    .notice-text {
      font-size: 14px;
      color: var(--light);
      text-align: center;
      margin-top: 16px;
    }

    /* ─── BOTTOM FIXED BAR ─────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 84px;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; z-index: 100;
    }
    .progress-bar {
      position: absolute; top: -1px; left: 0; right: 0;
      height: 2px; background: var(--border);
    }
    .progress-fill {
      width: 100%; /* 마지막 단계 */
      height: 100%; background: var(--dark); transition: width 0.3s ease;
    }
    .btn-prev {
      background: none; border: none; font-size: 16px; font-weight: 600;
      color: var(--dark); text-decoration: underline;
      cursor: pointer; transition: color 0.15s; padding: 10px;
    }
    .btn-prev:hover { color: #000; }
    .btn-next {
      background: var(--dark); color: var(--white); border: none;
      border-radius: 8px; padding: 14px 32px; font-size: 16px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-next:hover:not(:disabled) { background: #000; }
    .btn-next:disabled { background: #dddddd; color: #ffffff; cursor: not-allowed; }

    @media (max-width: 640px) {
      .host-navbar { padding: 0 24px; height: 64px; }
      .bottom-bar { padding: 0 24px; }
      .main-content { padding-top: 100px; padding-bottom: 120px;}
      .page-title { font-size: 26px; }
    }
  </style>
</head>
<body>

  <header class="host-navbar">
    <a class="host-nav-logo" href="host-dashboard.html">
      OPEN LETTER
      <span>HOST</span>
    </a>
    <button class="btn-exit" onclick="window.location.href='host-dashboard.html'">저장 및 나가기</button>
  </header>

  <main class="main-content">
    <h1 class="page-title">요금을 설정해주세요</h1>

    <!-- 주중 요금 -->
    <div class="form-group">
      <label class="form-label" for="priceWeekday">주중 요금 (월~목)</label>
      <div class="input-wrap">
        <input type="text" id="priceWeekday" class="price-input" placeholder="100,000">
        <span class="input-suffix">원/박</span>
      </div>
    </div>

    <!-- 주말 요금 -->
    <div class="form-group" style="margin-bottom: 20px;">
      <label class="form-label" for="priceWeekend">주말 요금 (금~일)</label>
      <div class="input-wrap">
        <input type="text" id="priceWeekend" class="price-input" placeholder="150,000">
        <span class="input-suffix">원/박</span>
      </div>
    </div>

    <!-- 주말/주중 동일 옵션 -->
    <label class="checkbox-wrap">
      <input type="checkbox" id="samePriceCheck">
      <span class="checkbox-label">주말 요금을 주중과 동일하게 설정</span>
    </label>

    <p class="notice-text">요금은 등록 후에도 언제든지 변경할 수 있습니다.</p>
  </main>

  <footer class="bottom-bar">
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <button class="btn-prev" onclick="history.back()">뒤로</button>
    <button class="btn-next" id="nextBtn" disabled onclick="window.location.href='host-register-success.html'">완료</button>
  </footer>

  <script>
    const weekdayInput = document.getElementById('priceWeekday');
    const weekendInput = document.getElementById('priceWeekend');
    const sameCheck = document.getElementById('samePriceCheck');
    const nextBtn = document.getElementById('nextBtn');

    function formatNumber(e) {
      let val = e.target.value.replace(/[^0-9]/g, ''); // 숫자만 남기기
      if (val) {
        e.target.value = parseInt(val, 10).toLocaleString('ko-KR');
      } else {
        e.target.value = '';
      }
      
      if (sameCheck.checked) {
        weekendInput.value = weekdayInput.value;
      }
      nextBtn.disabled = (weekdayInput.value.length === 0);
    }

    weekdayInput.addEventListener('input', formatNumber);
    weekendInput.addEventListener('input', formatNumber);

    sameCheck.addEventListener('change', () => {
      weekendInput.disabled = sameCheck.checked;
      if (sameCheck.checked) {
        weekendInput.value = weekdayInput.value;
      }
    });
  </script>
</body>
</html>
