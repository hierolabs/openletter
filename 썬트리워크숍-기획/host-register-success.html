<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>숙소 등록 완료! – OPEN LETTER HOST</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f9fa;
      --white: #ffffff;
      --dark: #222222;
      --mid: #717171;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .success-container {
      background: var(--white);
      padding: 64px 40px;
      border-radius: 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.06);
      text-align: center;
      max-width: 480px;
      width: 90%;
      animation: popup 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes popup {
      0% { transform: translateY(40px) scale(0.95); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      background: #f0fdf4;
      color: #16a34a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon-wrap svg {
      width: 40px;
      height: 40px;
      stroke-width: 2.5;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .desc {
      font-size: 15px;
      color: var(--mid);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .btn-dashboard {
      display: inline-block;
      background: var(--dark);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s, background 0.2s;
      width: 100%;
    }
    .btn-dashboard:hover {
      background: #000;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="success-container">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1 class="title">숙소가 등록되었습니다!</h1>
    <p class="desc">
      입력하신 정보로 숙소가 성공적으로 생성되었습니다.<br>
      대시보드에서 예약 일정과 세부 사항을 확인해보세요.
    </p>
    <a href="host-dashboard.html" class="btn-dashboard">
      대시보드로 이동
    </a>
  </div>

</body>
</html>
